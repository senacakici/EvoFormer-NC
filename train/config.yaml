model:
  d_model: 512
  n_heads: 8
  n_layers: 6
  ffn_dim: 2048
  dropout: 0.1
  n_tissues: 200

training:
  batch_size: 32
  max_epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip: 1.0
  num_workers: 8
  precision: "16-mixed"        # use "32" for debugging

loss:
  w_impact: 1.0
  w_tissue: 0.5
  w_mechanism: 0.5
  pos_weight: 5.0              # upweight pathogenic variants

data:
  train_records: "data/splits/train.json"
  val_records:   "data/splits/val.json"
  test_records:  "data/splits/test.json"
  conservation_dir: "data/preprocessing/conservation/"

output:
  checkpoint_dir: "checkpoints/"
  results_dir:    "results/"

wandb:
  enabled: false
  project: "evoformer-nc"
  run_name: "baseline"
